spring:
  application:
    name: learn-spring-ai
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:30b
    google:
      genai:
#        project-id: gen-lang-client-0222063252
##        location:
        api-key:
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.9
        embedding:
          api-key:
          text:
            model: text-embedding-004


    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: NONE


  datasource:
    url: jdbc:postgresql://localhost:5434/my-test-vector-db
    username: my-user
    password: password
    driver-class-name: org.postgresql.Driver

logging:
  level:
    org.springframework.ai:
      chat.client: DEBUG
